<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindSpark | Home</title>
    <link rel="shortcut icon" href="images/mindSpark.jpg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <nav class="nav">
            <div class="logo">
                <h2><i class="fa-solid fa-brain"></i> Mind <span>Spark</span></h2>
            </div>
            
            <div class="nav-links">
                <a href="#">Home</a>
                <a href="#">Quizzes</a>
                <a href="#">Result</a>
                <div id="user"></div>
            </div>
        </nav>
    </div>

    <main class="hero">
        <section class="text">
            <h1>Test your <span>Skills</span> with <i class="fa-solid fa-brain"></i> Mind <span>Spark</span></h1>
            <p>Mind <span>Spark</span> is an interactive platform where you test your skills in HTML, CSS, and JavaScript with real-time feedback.</p>
            <button class="cta-btn" id="getbtn">Get Started</button>
        </section>

        <section class="image-container">
            <div class="card-wrapper">
                <img src="images/laptop.avif" alt="Coding Laptop">
                <div class="floating-badge">
                    <div class="badge-icon"><i class="fa-solid fa-crown"></i></div>
                    <div class="badge-info">
                        <span>Test and become</span>
                        <strong>Pro Developer</strong>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="bottomnav">
        <div class="nav-item active">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>Learn</span>
        </div>
        <div class="nav-item">
            <i class="fa-solid fa-book-open"></i>
            <span>Quiz</span>
        </div>
        <div class="nav-item">
            <i class="fa-solid fa-chart-simple"></i>
            <span>Stats</span>
        </div>
        <div class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="quiz.js"></script>
</body>
</html>
