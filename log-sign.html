<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindSpark | Login-signin</title>
    <link rel="shortcut icon" href="images/mindSpark.jpg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="login-sign.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            
            <div class="form-container">
                <div id="signup-section">
                    <div class="auth-logo">
                        <i class="fa-solid fa-brain"></i>
                        <h1>Mind<span>Spark</span></h1>
                    </div>
                    <h2>Create Account</h2>
                    <div class="dd">
                    <p>Enter your details to get started</p>
                    </div>
                    <form id="signup-form" autocomplete="off">
                        <div class="input-field profile-upload-field">
                            <i class="fa-solid fa-image"></i>
                            <input type="text" placeholder="Upload Profile" readonly onclick="document.getElementById('profile-file').click();">
                            <div class="input-preview" id="imagePreview">
                                <i class="fa-solid fa-user-plus"></i>
                            </div>
                            <input type="file" id="profile-file" accept="image/*" hidden>
                        </div>
                        <div class="input-field">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" placeholder="Full Name" required id="signup-name">
                        </div>
                        <div class="input-field">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" placeholder="Email Address" required id="signup-email">
                        </div>
                        <div class="input-field">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" placeholder="Password" required id="signup-pass">
                        </div>
                        <button type="submit" class="btn-auth">Sign Up</button>
                        <p></p>
                    </form>
                </div>

                <div id="login-section" style="display: none;">
                    <div class="auth-logo">
                        <i class="fa-solid fa-brain"></i>
                        <h1>Mind<span>Spark</span></h1>
                    </div>
                    <h2>Sign In</h2>
                    <div class="dd">
                    <p>Please enter your login credentials</p>
                    </div>
                    <form id="login-form" autocomplete="off">
                        <div class="input-field">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" placeholder="Full Name" required id="login-name">
                        </div>
                        <div class="input-field">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" placeholder="Password" required id="login-pass">
                        </div>
                        <button type="submit" class="btn-auth">Login</button>
                            <p class="link" id="link">Don't have an account? <span>Create one</span></p>

                    </form>
                </div>
            </div>

            <div class="overmain">
            <div class="overlay-container">
                <div class="overlay-panel">
                    <div id="toggle-to-login">
                        <h2>Hello, There!</h2>
                        <p>Already have an account? Login to stay connected with us.</p>
                        <button class="ghost" id="go-to-login">SIGN IN</button>
                    </div>
                    <div id="toggle-to-signup" style="display: none;">
                        <h2>Welcome Back!</h2>
                        <p>New here? Start your journey with us today.</p>
                        <button class="ghost" id="go-to-signup">Login</button>
                    
                    </div>
                </div>
            </div>

        </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
